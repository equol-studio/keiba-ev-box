name: refresh-scan

on:
  schedule:
    - cron: '0 12 * * 5'   # 毎週金 12:00 UTC = 21:00 JST（出馬表＋予想オッズ）
    - cron: '0 22 * * 5,6' # 金・土 22:00 UTC = 土・日 7:00 JST（予想オッズ再取得）
  workflow_dispatch:
    inputs:
      dates:
        description: 'YYYYMMDD をカンマ区切り（空なら直近の土日）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: refresh-scan
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build auto.js from netkeiba
        env:
          DATES: ${{ github.event.inputs.dates }}
        run: node scripts/refresh.mjs
      - name: Commit & push if changed
        run: |
          git config user.name "keiba-bot"
          git config user.email "actions@users.noreply.github.com"
          git add auto.js
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto: refresh 全レース判定 ($(date -u +%FT%TZ))"
            git push
          fi
