<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>競馬 期待値ボックス</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="期待値BOX">
<meta name="theme-color" content="#0b3d2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b3d2e'/%3E%3Ctext x='50' y='56' font-size='62' text-anchor='middle' dominant-baseline='central' fill='white' font-family='sans-serif'%3E競%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0a1310; --bg2:#0d1a16; --card:#11201b; --card2:#0f1c17;
    --line:rgba(255,255,255,.09); --text:#e9f0ec; --muted:#8ba79c;
    --green:#22c07d; --gold:#e7b64c; --blue:#52a8ef; --red:#ef6e72; --grayp:#7d938b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 50% -10%, #15302550, transparent),
      linear-gradient(180deg,var(--bg),var(--bg2) 60%,#08110e);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:600px;margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 14px) calc(env(safe-area-inset-right) + 16px)
            calc(env(safe-area-inset-bottom) + 40px) calc(env(safe-area-inset-left) + 16px);
  }
  .head{margin-bottom:6px}
  .title{font-size:23px;font-weight:800;letter-spacing:.02em;margin:0 0 6px}
  .headline{
    display:inline-block;font-size:12.5px;font-weight:700;color:#bff0d6;
    background:rgba(34,192,125,.13);border:1px solid rgba(34,192,125,.3);
    padding:4px 10px;border-radius:999px;margin-bottom:6px;
  }
  .updated{font-size:12px;color:var(--muted)}
  .searchbar{position:sticky;top:env(safe-area-inset-top);z-index:10;display:flex;gap:8px;margin:8px 0 4px;padding:8px 0 10px;background:var(--bg)}
  .searchbar input{flex:1;font-size:16px;color:var(--text);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;outline:none}
  .searchbar input:focus{border-color:rgba(34,192,125,.55)}
  .searchbar button{flex:0 0 auto;font-size:13px;font-weight:700;color:#cfe0d8;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:0 13px}
  .note{
    font-size:13px;color:#dfe9e3;background:var(--card);border:1px solid var(--line);
    border-left:3px solid var(--gold);border-radius:10px;padding:10px 12px;margin:8px 0 0;
  }
  .block{margin-top:22px}
  .blockTitle{
    font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.08em;
    margin:0 0 10px;padding-left:2px;
  }
  .policy{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;gap:10px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .ph{flex:0 0 64px;font-size:12px;font-weight:800;color:var(--green)}
  .pt{flex:1;font-size:12.5px;color:#d7e3dd}
  .strategy{background:linear-gradient(180deg,#13241d,#0f1c17);border:1px solid var(--line);border-left:3px solid var(--green);border-radius:12px;padding:12px 14px;margin-top:14px}
  .strategy h2{font-size:13px;font-weight:800;color:#bff0d6;margin:0 0 8px}
  .strategy ul{margin:0;padding-left:18px}
  .strategy li{font-size:12.5px;color:#d7e3dd;margin:5px 0}
  .card{
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
  }
  .cardTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .venue{font-size:11px;font-weight:800;color:#06120d;background:var(--green);padding:2px 8px;border-radius:6px}
  .rno{font-size:12px;font-weight:700;color:#cfe0d8}
  .post{font-size:11.5px;color:var(--muted)}
  .rname{font-size:18px;font-weight:800;margin:2px 0}
  .rsub{font-size:12px;color:var(--muted)}
  .verdict{
    flex:0 0 auto;font-size:12px;font-weight:800;color:#06120d;background:var(--gold);
    padding:5px 10px;border-radius:999px;white-space:nowrap;
  }
  .verdictNote{font-size:12px;color:#cdded6;margin:8px 0 4px}
  .horses{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .horse{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .hrow{display:flex;align-items:center;gap:10px}
  .num{
    flex:0 0 30px;height:26px;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;color:#cfe0d8;background:#0a1612;border:1px solid var(--line);border-radius:7px;
  }
  .hname{flex:1;font-size:15px;font-weight:700}
  .tag{flex:0 0 auto;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
  .tag.gold{color:#3a2c06;background:var(--gold)}
  .tag.green{color:#04140c;background:var(--green)}
  .tag.blue{color:#04121f;background:var(--blue)}
  .tag.red{color:#220607;background:var(--red)}
  .tag.muted{color:#0c1512;background:var(--grayp)}
  .hnote{font-size:12px;color:#b8cabf;margin-top:6px;padding-left:40px}
  .bets{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px}
  .betsTitle{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.04em;margin-bottom:6px}
  .betLabel{display:inline-block;font-size:10px;font-weight:800;padding:1px 7px;border-radius:5px;margin-right:7px;background:rgba(255,255,255,.14);color:#e9f0ec;vertical-align:middle}
  .betMain{font-size:13px;font-weight:700;color:#fbe7b0;background:rgba(231,182,76,.10);border:1px solid rgba(231,182,76,.30);border-radius:9px;padding:9px 11px;line-height:1.5}
  .betBox{font-size:13px;font-weight:700;color:#bff0d6;background:rgba(34,192,125,.09);border:1px solid rgba(34,192,125,.28);border-radius:9px;padding:9px 11px;line-height:1.5;margin-top:6px}
  .betSub{font-size:12.5px;color:#cdded6;margin-top:7px}
  .betSub b{color:#e9f0ec}
  .odds{margin-top:11px;border-top:1px dashed var(--line);padding-top:9px}
  .oddsTitle{font-size:11px;font-weight:800;color:var(--blue);letter-spacing:.03em;margin-bottom:5px}
  .oRow{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 2px;border-bottom:1px solid rgba(255,255,255,.05)}
  .oRow.oHead{font-size:10px;font-weight:800;color:var(--muted)}
  .oPop{flex:0 0 30px;text-align:center;color:#cfe0d8;font-weight:700}
  .oSel{flex:1;min-width:0;color:#e9f0ec;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .oWin{flex:0 0 52px;text-align:right;color:#fbe7b0;font-weight:700}
  .oPlace{flex:0 0 70px;text-align:right;color:#bff0d6;font-weight:700}
  .detail{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  .ev{font-size:12.5px;color:#e7d9b3;margin-bottom:6px}
  .memo{font-size:12.5px;color:#cdded6}
  .hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:10px;user-select:none}
  .card .hnote,.card .detail{display:none}
  .card.open .hnote,.card.open .detail{display:block}
  .kIntro{font-size:12.5px;color:#d7e3dd;margin-bottom:10px}
  .kGuide{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .gcard{border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .gcard h3{font-size:12px;font-weight:800;margin:0 0 5px}
  .gcard ul{margin:0;padding-left:16px}
  .gcard li{font-size:12px;color:#d7e3dd;margin:3px 0}
  .gRide{background:rgba(34,192,125,.08);border-color:rgba(34,192,125,.28)}
  .gRide h3{color:#bff0d6}
  .gSkip{background:rgba(239,110,114,.07);border-color:rgba(239,110,114,.28)}
  .gSkip h3{color:#f4b6b8}
  .gProfit{background:rgba(231,182,76,.08);border-color:rgba(231,182,76,.28)}
  .gProfit h3{color:#fbe7b0}
  .kDay{font-size:12.5px;font-weight:800;color:var(--green);margin:12px 0 7px;padding-left:2px}
  .kLeg{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:6px}
  .kNo{flex:0 0 40px;font-size:12.5px;font-weight:800;color:#cfe0d8;text-align:center}
  .kMid{flex:1;min-width:0}
  .kCond{font-size:12px;color:#cdded6}
  .kAnchor{font-size:12px;color:#e7d9b3;margin-top:2px}
  .kFit{flex:0 0 auto;font-size:12px;font-weight:800;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px}
  .fit-good{background:var(--green);color:#04140c}
  .fit-ok{background:var(--blue);color:#04121f}
  .fit-warn{background:var(--grayp);color:#0c1512}
  .kNote{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.6}
  .scRow{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:7px 10px;margin-bottom:5px}
  .scNo{flex:0 0 38px;font-size:12px;font-weight:800;color:#cfe0d8;text-align:center}
  .scMid{flex:1;min-width:0}
  .scCond{font-size:11.5px;color:#dbe6e0}
  .scNote{font-size:11px;color:var(--muted);margin-top:1px}
  .scRight{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .scCall{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .call-go{background:var(--green);color:#04140c}
  .call-skip{background:var(--grayp);color:#0c1512}
  .call-watch{background:var(--blue);color:#04121f}
  .scConf{font-size:10px;color:var(--gold);letter-spacing:1px}
  .pending{font-size:12.5px;color:#cdded6;background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:12px;margin-top:8px}
  .disclaimer{font-size:11px;color:var(--muted);margin-top:22px;text-align:center;line-height:1.6}
  .noRes{font-size:13px;color:var(--muted);text-align:center;padding:30px 0}
  .hidden{display:none !important}
</style>
</head>
<body>
  <main class="wrap" id="app"></main>
  <script src="data.js"></script>
  <script>
  (function(){
    var D = window.KEIBA_DATA || {};
    var tagColor = { "軸":"gold", "◎":"green", "○":"blue", "△":"muted", "▲":"red" };
    function el(tag, cls, txt){ var e=document.createElement(tag); if(cls) e.className=cls; if(txt!=null) e.textContent=txt; return e; }
    function betRow(label, text){ var d=el('div','betSub'); d.appendChild(el('b',null,label+'：')); d.appendChild(document.createTextNode(text)); return d; }
    function labeledBet(label, text, cls){ var d=el('div',cls); d.appendChild(el('span','betLabel',label)); d.appendChild(document.createTextNode(text)); return d; }
    function fitClass(f){ return f==='◎' ? 'good' : (f==='○' ? 'ok' : 'warn'); }
    function stars(n){ var s=''; for(var i=0;i<n;i++){ s+='★'; } return s; }
    function guideCard(title, items, cls){
      var d=el('div','gcard '+cls); d.appendChild(el('h3',null,title));
      var ul=el('ul'); (items||[]).forEach(function(it){ ul.appendChild(el('li',null,it)); }); d.appendChild(ul);
      return d;
    }
    function oddsRow(pop, sel, win, place, isHead){
      var r=el('div','oRow'+(isHead?' oHead':''));
      r.appendChild(el('span','oPop', pop));
      r.appendChild(el('span','oSel', sel));
      r.appendChild(el('span','oWin', win));
      r.appendChild(el('span','oPlace', place));
      return r;
    }
    var root = document.getElementById('app');

    var head = el('header','head');
    head.appendChild(el('h1','title', D.title || '競馬 期待値ボックス'));
    if(D.headline) head.appendChild(el('div','headline', D.headline));
    head.appendChild(el('div','updated', '更新: ' + (D.updated||'-')));
    root.appendChild(head);

    // 検索バー
    var sb = el('div','searchbar');
    var input = el('input'); input.id='q'; input.type='search';
    input.setAttribute('placeholder','検索（馬名・騎手・レース・場名…）');
    input.setAttribute('autocomplete','off'); input.setAttribute('autocorrect','off'); input.setAttribute('autocapitalize','off');
    var clr = el('button',null,'クリア');
    sb.appendChild(input); sb.appendChild(clr);
    root.appendChild(sb);

    if(D.note) root.appendChild(el('div','note meta', D.note));

    if(D.policy && D.policy.length){
      var sec = el('section','block meta');
      sec.appendChild(el('h2','blockTitle','今週の方針'));
      var grid = el('div','policy');
      D.policy.forEach(function(p){
        var row = el('div','prow');
        row.appendChild(el('span','ph', p.h));
        row.appendChild(el('span','pt', p.t));
        grid.appendChild(row);
      });
      sec.appendChild(grid);
      root.appendChild(sec);
    }

    if(D.strategy){
      var s = el('section','strategy meta');
      s.appendChild(el('h2',null, D.strategy.title || '買い方の方針'));
      if(D.strategy.points && D.strategy.points.length){
        var ul = el('ul');
        D.strategy.points.forEach(function(p){ ul.appendChild(el('li',null,p)); });
        s.appendChild(ul);
      }
      root.appendChild(s);
    }

    var races = D.races || [];
    if(races.length){
      var order=[], byDay={};
      races.forEach(function(r){ var d=r.day||'-'; if(!byDay[d]){byDay[d]=[];order.push(d);} byDay[d].push(r); });
      order.forEach(function(day){
        var sec = el('section','block grp');
        sec.appendChild(el('h2','blockTitle', day));
        byDay[day].forEach(function(r){ sec.appendChild(card(r)); });
        root.appendChild(sec);
      });
    }

    if(D.scan){
      var sc = D.scan;
      var ssec = el('section','block grp');
      ssec.appendChild(el('h2','blockTitle', '📋 ' + (sc.title||'全レース判定')));
      if(sc.intro) ssec.appendChild(el('div','kIntro', sc.intro));
      (sc.days||[]).forEach(function(d){
        var grp = el('div','kGroup grp');
        grp.appendChild(el('div','kDay', d.day));
        (d.races||[]).forEach(function(rc){
          var row = el('div','scRow srch');
          row.dataset.s = [rc.no, rc.cond, rc.note, rc.call].join(' ').toLowerCase();
          row.appendChild(el('span','scNo', rc.no));
          var mid = el('div','scMid');
          mid.appendChild(el('div','scCond', rc.cond));
          if(rc.note) mid.appendChild(el('div','scNote', rc.note));
          row.appendChild(mid);
          var right = el('div','scRight');
          var cc = rc.call==='参戦' ? 'call-go' : (rc.call==='見送り' ? 'call-skip' : 'call-watch');
          right.appendChild(el('div','scCall '+cc, rc.call||''));
          if(rc.conf) right.appendChild(el('div','scConf', stars(rc.conf)));
          row.appendChild(right);
          grp.appendChild(row);
        });
        ssec.appendChild(grp);
      });
      root.appendChild(ssec);
    }

    if(D.korogashi){
      var k = D.korogashi;
      var ksec = el('section','block grp');
      ksec.appendChild(el('h2','blockTitle', '🎲 ' + (k.title||'複勝転がし')));
      if(k.intro) ksec.appendChild(el('div','kIntro', k.intro));
      if(k.guide){
        var g = el('div','kGuide');
        g.appendChild(guideCard('🟢 乗る基準', k.guide.ride, 'gRide'));
        g.appendChild(guideCard('🔴 スキップ', k.guide.skip, 'gSkip'));
        g.appendChild(guideCard('💰 利確', k.guide.profit, 'gProfit'));
        ksec.appendChild(g);
      }
      (k.days||[]).forEach(function(d){
        var grp = el('div','kGroup grp');
        grp.appendChild(el('div','kDay', d.day));
        (d.legs||[]).forEach(function(lg){
          var row = el('div','kLeg srch');
          row.dataset.s = [lg.no, lg.cond, lg.anchor].join(' ').toLowerCase();
          row.appendChild(el('span','kNo', lg.no));
          var mid = el('div','kMid');
          mid.appendChild(el('div','kCond', lg.cond));
          if(lg.anchor) mid.appendChild(el('div','kAnchor', '軸: '+lg.anchor));
          row.appendChild(mid);
          if(lg.fit) row.appendChild(el('span','kFit fit-'+fitClass(lg.fit), lg.fit));
          grp.appendChild(row);
        });
        ksec.appendChild(grp);
      });
      if(k.note) ksec.appendChild(el('div','kNote', k.note));
      root.appendChild(ksec);
    }

    if(D.pending) root.appendChild(el('div','pending meta', D.pending));
    if(D.disclaimer) root.appendChild(el('div','disclaimer meta', D.disclaimer));

    var noRes = el('div','noRes hidden','該当なし');
    root.appendChild(noRes);

    // 検索フィルタ
    function applyFilter(){
      var q = (input.value||'').trim().toLowerCase();
      var metas = root.querySelectorAll('.meta');
      var srch = root.querySelectorAll('.srch');
      var grps = root.querySelectorAll('.grp');
      if(!q){
        metas.forEach(function(m){ m.classList.remove('hidden'); });
        srch.forEach(function(s){ s.classList.remove('hidden'); });
        grps.forEach(function(gr){ gr.classList.remove('hidden'); });
        noRes.classList.add('hidden');
        return;
      }
      metas.forEach(function(m){ m.classList.add('hidden'); });
      var any = false;
      srch.forEach(function(s){
        var match = (s.dataset.s||'').indexOf(q) >= 0;
        s.classList.toggle('hidden', !match);
        if(match) any = true;
      });
      grps.forEach(function(gr){
        gr.classList.toggle('hidden', !gr.querySelector('.srch:not(.hidden)'));
      });
      noRes.classList.toggle('hidden', any);
    }
    input.addEventListener('input', applyFilter);
    clr.addEventListener('click', function(){ input.value=''; applyFilter(); input.focus(); });

    function card(r){
      var c = el('article','card srch');
      var stext = [r.venue, r.no, r.name, r.course, r.verdict]
        .concat((r.box||[]).map(function(h){ return (h.num||'')+' '+(h.name||'')+' '+(h.note||''); }))
        .concat([ r.bets?r.bets.pick:'', r.bets?r.bets.box5:'', r.bets?r.bets.note:'', r.memo||'', r.verdictNote||'' ])
        .join(' ').toLowerCase();
      c.dataset.s = stext;
      var top = el('div','cardTop');
      var left = el('div','cardHead');
      var meta = el('div','meta-row');
      if(r.venue) meta.appendChild(el('span','venue', r.venue));
      if(r.no) meta.appendChild(el('span','rno', r.no));
      if(r.post) meta.appendChild(el('span','post', '発走 '+r.post));
      left.appendChild(meta);
      left.appendChild(el('div','rname', r.name||''));
      var sub = el('div','rsub');
      sub.textContent = [r.course, r.field].filter(Boolean).join('  /  ');
      left.appendChild(sub);
      top.appendChild(left);
      if(r.verdict) top.appendChild(el('div','verdict', r.verdict));
      c.appendChild(top);
      if(r.verdictNote) c.appendChild(el('div','verdictNote', r.verdictNote));

      var hl = el('div','horses');
      (r.box||[]).forEach(function(h){
        var row = el('div','horse');
        var hr = el('div','hrow');
        hr.appendChild(el('span','num', (h.num!=null && h.num!=='') ? h.num : '－'));
        hr.appendChild(el('span','hname', h.name||''));
        if(h.tag) hr.appendChild(el('span','tag '+(tagColor[h.tag]||'muted'), h.tag));
        row.appendChild(hr);
        if(h.note) row.appendChild(el('div','hnote', h.note));
        hl.appendChild(row);
      });
      c.appendChild(hl);

      if(r.bets){
        var b = el('div','bets');
        b.appendChild(el('div','betsTitle', '💴 おすすめ買い目' + (r.bets.stance ? '（'+r.bets.stance+'）' : '')));
        if(r.bets.pick) b.appendChild(labeledBet('本線', r.bets.pick, 'betMain'));
        if(r.bets.box5) b.appendChild(labeledBet('5頭BOX', r.bets.box5, 'betBox'));
        c.appendChild(b);
      }

      if(r.odds){
        var od = el('div','odds');
        od.appendChild(el('div','oddsTitle', '📸 オッズ' + (r.odds.asOf ? '（'+r.odds.asOf+'）' : '')));
        od.appendChild(oddsRow('人気','馬','単勝','複勝', true));
        (r.odds.rows||[]).forEach(function(o){
          od.appendChild(oddsRow(o.pop!=null?o.pop:'', o.sel||'', o.win!=null?o.win:'—', o.place!=null?o.place:'—', false));
        });
        c.appendChild(od);
      }

      var detail = el('div','detail');
      if(r.bets){
        if(r.bets.alloc && r.bets.alloc !== '-') detail.appendChild(betRow('配分', r.bets.alloc));
        if(r.bets.note) detail.appendChild(betRow('狙い', r.bets.note));
      }
      if(r.ev) detail.appendChild(el('div','ev', '想定配当: '+r.ev));
      if(r.memo) detail.appendChild(el('div','memo', '🏁 '+r.memo));
      c.appendChild(detail);

      var hint = el('div','hint','タップで配分・根拠 ▾');
      c.appendChild(hint);
      c.addEventListener('click', function(){
        var open = c.classList.toggle('open');
        hint.textContent = open ? '閉じる ▴' : 'タップで配分・根拠 ▾';
      });
      return c;
    }

    if('serviceWorker' in navigator && location.protocol === 'https:'){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  })();
  </script>
</body>
</html>
